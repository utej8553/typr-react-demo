version: "3.9"
services:
  frontend:
    image: 237024526028.dkr.ecr.us-east-1.amazonaws.com/typr-frontend:latest
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    image: 237024526028.dkr.ecr.us-east-1.amazonaws.com/typr-backend:latest
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo:27017/typeracer
    depends_on:
      - mongo

  mongo:
    image: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
volumes:
  mongo-data:
